# Conda environment layer for the Python scripts in this directory.
# Install first:
#   conda env create -f requirements-python.yml
# Update an existing environment:
#   conda env update -n avail-powerplants -f requirements-python.yml --prune
name: avail-powerplants
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=2.0
  - matplotlib>=3.7
  - joblib>=1.3
  - pyarrow>=12.0
